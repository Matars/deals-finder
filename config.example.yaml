# deals-finder configuration
# Generated by: python setup.py

# User preferences
user:
  language: sv          # ISO 639-1 (sv, en, de, etc.)
  country: SE           # ISO 3166 (SE, NO, DE, etc.)
  currency: SEK         # Output currency

# Vendor websites to scrape
vendors:
  - name: blocket
    url: "https://www.blocket.se/recommerce/forsale/search?category=0.93&q={query}"
    enabled: true

  - name: tradera
    url: "https://www.tradera.com/search?q={query}"
    enabled: true

  - name: vinted
    url: "https://www.vinted.se/catalog?search_text={query}"
    enabled: true

  - name: ebay
    url: "https://www.ebay.com/sch/i.html?_nkw={query}"
    enabled: true

# Categories and search terms
categories:
  - name: gpu
    icon: "🎮"
    queries:
      - gpu
      - grafikkort

  - name: keyboard
    icon: "⌨️"
    queries:
      - tangentbord

  - name: ram
    icon: "💾"
    queries:
      - ram ddr5
      - ram ddr4

  - name: psu
    icon: "🔌"
    queries:
      - nätaggregat

  - name: retro
    icon: "🕹️"
    queries:
      - nintendo 64
      - retro konsol

# Publishing
publish:
  method: github_pages    # github_pages | local
  repo: "Matars/deals-finder"
  branch: main

# Notifications
notify:
  discord_channel: "1495071015204818994"

# Self-healing
self_heal:
  enabled: true
  max_retries: 2          # How many times to auto-fix before alerting user
