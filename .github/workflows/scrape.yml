name: Daily Deals Scrape

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC+2 (Sweden) = 07:00 UTC
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run scraper
        run: python3 scraper/scrape_all.py --config config.yaml --docs docs

      - name: Commit and push
        run: |
          git config user.name "deals-bot"
          git config user.email "bot@deals-finder"
          git add docs/
          git diff --staged --quiet || git commit -m "daily deals update $(date +%Y-%m-%d)"
          git push
