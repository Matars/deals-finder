<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>deals finder — sweden tech deals</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --panel-2: #1a2439;
      --text: #e8edf8;
      --muted: #9baccc;
      --accent: #7aa2ff;
      --good: #59d499;
      --line: #2a3652;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #0a1020 0%, #0b1220 100%);
      color: var(--text);
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 56px; }
    .hero {
      background: radial-gradient(1200px 600px at 10% -20%, #233b72, transparent), var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 8px; font-size: 1.4rem; }
    .muted { color: var(--muted); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .chip {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: #dce6ff;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
    }
    .actions { margin-top: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }
    .toolbar {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    select {
      background: #0f1730;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 10px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 11px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th { color: #c8d7ff; background: #0f1730; }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: #131d34;
      color: #cfe0ff;
      margin-top: 4px;
    }
    .discount { color: var(--good); font-weight: 600; }
    .empty { padding: 16px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>🇸🇪 daily sweden second-hand tech deals</h1>
      <div class="muted" id="meta">loading…</div>
      <div class="chips" id="trackingChips"></div>
      <div class="actions">
        <a href="./archive/index.html">open archive</a>
        <a href="./latest.json">raw json</a>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <div class="muted" id="countLabel">0 deals</div>
        <div>
          <label class="muted" for="sourceFilter">source:</label>
          <select id="sourceFilter">
            <option value="all">all</option>
          </select>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>item</th>
            <th>price</th>
            <th>original / nypris</th>
            <th>discount</th>
            <th>source</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" class="empty" style="display:none;">no deals matched this filter.</div>
    </section>
  </div>

  <script>
    const TRACKING = [
      'gpus', 'retro consoles', 'keyboards', 'ram kits', 'pcs', 'sources: blocket + tradera'
    ];

    const fmtSEK = (n) => (typeof n === 'number' && Number.isFinite(n)) ? `${n.toLocaleString('sv-SE')} kr` : '—';
    const chips = document.getElementById('trackingChips');
    TRACKING.forEach(t => {
      const el = document.createElement('span');
      el.className = 'chip';
      el.textContent = t;
      chips.appendChild(el);
    });

    let allItems = [];

    const rows = document.getElementById('rows');
    const empty = document.getElementById('empty');
    const sourceFilter = document.getElementById('sourceFilter');
    const countLabel = document.getElementById('countLabel');

    function render() {
      const selected = sourceFilter.value;
      const filtered = selected === 'all'
        ? allItems
        : allItems.filter(i => (i.source || '').toLowerCase() === selected);

      rows.innerHTML = '';
      filtered.forEach(item => {
        const tr = document.createElement('tr');
        const src = item.original_price_is_estimated
          ? '<span class="pill">estimated nypris</span>'
          : '<span class="pill">listing nypris</span>';
        tr.innerHTML = `
          <td><a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title || 'untitled'}</a></td>
          <td>${fmtSEK(item.price)}</td>
          <td>${fmtSEK(item.original_price)}<br>${src}</td>
          <td class="discount">${item.discount_percent ?? '—'}%</td>
          <td>${item.source || 'unknown'}</td>
        `;
        rows.appendChild(tr);
      });

      countLabel.textContent = `${filtered.length} deals`;
      empty.style.display = filtered.length ? 'none' : 'block';
    }

    fetch('./latest.json', { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        const date = data.date || 'unknown date';
        const count = Array.isArray(data.items) ? data.items.length : 0;
        document.getElementById('meta').textContent = `${date} • ${count} deals`;

        allItems = (data.items || []).slice();

        const sources = [...new Set(allItems.map(i => (i.source || 'unknown').toLowerCase()))].filter(Boolean).sort();
        sources.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s;
          opt.textContent = s;
          sourceFilter.appendChild(opt);
        });

        sourceFilter.addEventListener('change', render);
        render();
      })
      .catch(err => {
        document.getElementById('meta').textContent = `failed to load latest.json: ${err}`;
      });
  </script>
</body>
</html>
