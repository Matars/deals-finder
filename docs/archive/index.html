<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deal Archive | Sweden Tech Deals</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #58a6ff; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        h1 { color: #58a6ff; margin-bottom: 10px; }
        .subtitle { color: #8b949e; margin-bottom: 30px; }
        .archive-list { list-style: none; }
        .archive-item { margin-bottom: 10px; }
        .archive-link { display: block; background: #161b22; padding: 15px 20px; border-radius: 8px; color: #c9d1d9; text-decoration: none; transition: background 0.2s; }
        .archive-link:hover { background: #21262d; }
        .archive-date { color: #58a6ff; font-weight: 600; }
        .archive-count { color: #8b949e; font-size: 14px; float: right; }
        #loading { color: #8b949e; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← Back to current deals</a>
        <h1>📁 Deal Archive</h1>
        <p class="subtitle">Historical deals from previous days</p>
        
        <ul class="archive-list" id="archive-list">
            <li id="loading">Loading archive...</li>
        </ul>
    </div>

    <script>
        async function loadArchive() {
            try {
                const response = await fetch('archive.json');
                if (!response.ok) throw new Error('Failed to fetch');
                const data = await response.json();
                
                const list = document.getElementById('archive-list');
                list.innerHTML = '';
                
                data.forEach(entry => {
                    const li = document.createElement('li');
                    li.className = 'archive-item';
                    li.innerHTML = `
                        <a href="${entry.date}.html" class="archive-link">
                            <span class="archive-date">${entry.date}</span>
                            <span class="archive-count">${entry.count} deals →</span>
                        </a>
                    `;
                    list.appendChild(li);
                });
            } catch (error) {
                console.error('Error loading archive:', error);
                document.getElementById('loading').textContent = 'Failed to load archive.';
            }
        }
        
        loadArchive();
    </script>
</body>
</html>
