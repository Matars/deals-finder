<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>deals finder archive</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --line: #2a3652;
      --text: #e8edf8;
      --muted: #9baccc;
      --accent: #7aa2ff;
    }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 56px; }
    h1 { margin: 0 0 8px; }
    .muted { color: var(--muted); }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; margin-top: 16px; }
    .row { display: flex; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--line); padding: 12px 14px; }
    .row:last-child { border-bottom: 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>deals archive</h1>
    <p class="muted">daily snapshots generated by hermes.</p>
    <p><a href="../index.html">← back to latest</a></p>
    <div class="panel" id="list"></div>
  </div>

  <script>
    fetch('./archive.json', { cache: 'no-store' })
      .then(r => r.json())
      .then(entries => {
        const list = document.getElementById('list');
        list.innerHTML = '';
        (entries || []).forEach(e => {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `<div><a href="./${e.date}.html">${e.date}</a> <span class="muted">(${e.count} deals)</span></div><div><a href="./${e.date}.json">json</a></div>`;
          list.appendChild(row);
        });
        if (!entries || !entries.length) {
          list.innerHTML = '<div class="row muted">no archive entries yet.</div>';
        }
      })
      .catch(() => {
        document.getElementById('list').innerHTML = '<div class="row muted">no archive entries yet.</div>';
      });
  </script>
</body>
</html>
