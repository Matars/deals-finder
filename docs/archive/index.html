<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>deals finder archive</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
    li { margin: 8px 0; }
    a { color: #0a58ca; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h1>deals archive</h1>
  <p class="muted">daily snapshots generated by hermes.</p>
  <ul id="list"></ul>

  <script>
    fetch('./archive.json', { cache: 'no-store' })
      .then(r => r.json())
      .then(entries => {
        const list = document.getElementById('list');
        list.innerHTML = '';
        (entries || []).forEach(e => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="./${e.date}.html">${e.date}</a> (${e.count} deals) — <a href="./${e.date}.json">json</a>`;
          list.appendChild(li);
        });
        if (!entries || !entries.length) {
          list.innerHTML = '<li>no archive entries yet.</li>';
        }
      })
      .catch(() => {
        document.getElementById('list').innerHTML = '<li>no archive entries yet.</li>';
      });
  </script>
</body>
</html>
