# config.yaml — customize your deal finder here
#
# Fork this repo, edit this file, and your deals page goes live.

# Your GitHub repo details (update after forking)
github:
  owner: "your-username"
  repo: "deals-finder"
  branch: "main"

# Sources to scrape
sources:
  - name: blocket
    enabled: true
    url_pattern: "https://www.blocket.se/recommerce/forsale/search?category=0.93&q={query}"
    # blocket uses static HTML — fast http_get scraping

  - name: tradera
    enabled: true
    url_pattern: "https://www.tradera.com/search?q={query}"
    # tradera needs browser (JS-rendered) — enable when browser-harness is set up

  - name: vinted
    enabled: false  # enable when browser-harness is set up
    url_pattern: "https://www.vinted.se/catalog?search_text={query}&order=relevance"

  - name: ebay
    enabled: false  # bot detection — works but rate-limited
    url_pattern: "https://www.ebay.com/sch/i.html?_nkw={query}&_sop=15"

# Categories and search terms
# Each category has a list of Swedish search queries
categories:
  gpu:
    icon: "🎮"
    label: "GPUs"
    queries:
      - gpu
      - grafikkort

  keyboard:
    icon: "⌨️"
    label: "Keyboards"
    queries:
      - tangentbord

  ram:
    icon: "💾"
    label: "RAM"
    queries:
      - ram ddr5
      - ram ddr4

  psu:
    icon: "🔌"
    label: "Power Supplies"
    queries:
      - nätaggregat

  pc:
    icon: "🖥️"
    label: "PCs / Laptops"
    queries:
      - gaming dator

  retro:
    icon: "🕹️"
    label: "Retro Consoles"
    queries:
      - nintendo 64
      - retro konsol

  gaming:
    icon: "🎯"
    label: "Gaming Gear"
    queries:
      - gaming headset

  anime:
    icon: "✨"
    label: "Anime / Figures"
    queries:
      - anime figur

  poster:
    icon: "🖼️"
    label: "Posters / Art"
    queries:
      - poster

# Discord notification (optional)
discord:
  enabled: false
  webhook_url: ""  # paste your Discord webhook URL here
  # Get one: Server Settings → Integrations → Webhooks → New Webhook

# Scraping settings
scraper:
  max_workers: 8          # parallel HTTP requests
  timeout: 15             # seconds per request
  items_per_search: 25    # max items per search query
